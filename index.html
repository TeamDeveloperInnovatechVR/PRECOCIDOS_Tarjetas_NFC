<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#c40000,#8a0000);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* tarjeta */

.card{
background:white;
border-radius:22px;
width:360px;
box-shadow:0 30px 60px rgba(0,0,0,0.35);
overflow:hidden;
}

/* header */

.header{
background:linear-gradient(135deg,#ff9800,#ffb300);
padding:30px 20px;
text-align:center;
color:white;
}

/* avatar inicial */

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:white;
color:#c40000;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:bold;
margin:auto;
margin-bottom:10px;
}

/* nombre */

h1{
margin:5px 0;
font-size:24px;
}

/* empresa */

h2{
margin:0;
font-weight:normal;
font-size:16px;
opacity:0.9;
}

/* info */

.info{
padding:25px;
text-align:center;
color:#444;
line-height:1.8;
font-size:15px;
}

/* botones */

button{
background:linear-gradient(90deg,#ff9800,#ffb300);
border:none;
padding:15px;
width:85%;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* web */

.web{
display:block;
margin-top:18px;
color:#b30000;
font-weight:bold;
text-decoration:none;
}

.web:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

<div class="header">

<div class="avatar" id="avatar">?</div>

<h1 id="nombre">Cargando...</h1>
<h2 id="empresa"></h2>

</div>

<div class="info">

<div id="info"></div>

<button onclick="guardarContacto()">📲 Guardar contacto</button>

<a id="web" class="web" target="_blank">🌐 Sitio Web</a>

</div>

</div>

<script>

let contactoActual = null;

function obtenerParametro(nombre) {
const urlParams = new URLSearchParams(window.location.search);
return urlParams.get(nombre);
}

const contactoID = obtenerParametro("contacto");

fetch("contactos.json")
.then(res => res.json())
.then(data => {

contactoActual = data[contactoID];

if(!contactoActual){
document.getElementById("nombre").innerText="Contacto no encontrado";
return;
}

document.getElementById("nombre").innerText = contactoActual.nombre;
document.getElementById("empresa").innerText = contactoActual.empresa;

document.getElementById("info").innerHTML = `
📞 ${contactoActual.telefono}<br>
✉ ${contactoActual.email}<br>
🌎 ${contactoActual.pais}
`;

document.getElementById("web").href = contactoActual.web;

/* avatar inicial */

document.getElementById("avatar").innerText =
contactoActual.nombre.charAt(0);

});

/* guardar contacto */

function guardarContacto(){

const nombre = contactoActual.nombre;
const partes = nombre.split(" ");
const apellido = partes.pop();
const nombreReal = partes.join(" ");

const vcard =
`BEGIN:VCARD
VERSION:3.0
N:${apellido};${nombreReal};;;
FN:${contactoActual.nombre}
ORG:${contactoActual.empresa}
TEL;TYPE=CELL:${contactoActual.telefono}
EMAIL:${contactoActual.email}
URL:${contactoActual.web}
END:VCARD`;

const blob = new Blob([vcard], { type: "text/vcard" });
const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = contactoActual.nombre.replace(/\s/g,"_") + ".vcf";
a.click();

}

</script>

</body>
</html>
