<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,#c40000,#8a0000);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* tarjeta */

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
width:350px;
box-shadow:0 25px 50px rgba(0,0,0,0.35);
position:relative;
overflow:hidden;
}

/* barra superior decorativa */

.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:8px;
background:linear-gradient(90deg,#ffb300,#ffd54f);
}

/* imagen */

.profile-img{
width:120px;
height:120px;
border-radius:50%;
border:5px solid #ffc107;
margin-bottom:20px;
background:white;
padding:5px;
}

/* nombre */

h1{
color:#b30000;
margin-bottom:5px;
font-size:26px;
}

/* empresa */

h2{
color:#ff9800;
margin-top:0;
font-size:18px;
}

/* info */

#info{
color:#444;
line-height:1.6;
font-size:15px;
}

/* botón */

button{
background:linear-gradient(90deg,#ff9800,#ffb300);
border:none;
padding:15px;
width:100%;
border-radius:12px;
color:white;
font-size:16px;
margin-top:25px;
cursor:pointer;
font-weight:bold;
transition:all 0.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* link */

a{
display:block;
margin-top:15px;
color:#b30000;
font-weight:bold;
text-decoration:none;
font-size:15px;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

<img src="Resources/ROBOT.png" class="profile-img">

<h1 id="nombre">Cargando...</h1>
<h2 id="empresa"></h2>

<p id="info"></p>

<button onclick="guardarContacto()">📲 Guardar contacto</button>

<a id="web" target="_blank">🌐 Sitio Web</a>

</div>

<script>

let contactoActual = null;

function obtenerParametro(nombre) {
const urlParams = new URLSearchParams(window.location.search);
return urlParams.get(nombre);
}

const contactoID = obtenerParametro("contacto");

fetch("contactos.json")
.then(res => res.json())
.then(data => {

contactoActual = data[contactoID];

if(!contactoActual){
document.getElementById("nombre").innerText="Contacto no encontrado";
return;
}

document.getElementById("nombre").innerText = contactoActual.nombre;
document.getElementById("empresa").innerText = contactoActual.empresa;

document.getElementById("info").innerHTML = `
📞 ${contactoActual.telefono}<br>
✉ ${contactoActual.email}<br>
🌎 ${contactoActual.pais}
`;

document.getElementById("web").href = contactoActual.web;

});

function guardarContacto(){

const vcard =
`BEGIN:VCARD
VERSION:3.0
FN:${contactoActual.nombre}
ORG:${contactoActual.empresa}
TEL;TYPE=CELL:${contactoActual.telefono}
EMAIL:${contactoActual.email}
URL:${contactoActual.web}
END:VCARD`;

const blob = new Blob([vcard], { type: "text/vcard" });
const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "contacto.vcf";
a.click();

}

</script>

</body>
</html>
