<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto</title>

<style>

:root{
--color-bg1:#c40000;
--color-bg2:#8a0000;
--color-header1:#ff9800;
--color-header2:#ffb300;
--color-accent:#b30000;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(180deg,var(--color-bg1),var(--color-bg2));
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* tarjeta */

.card{
background:white;
border-radius:22px;
width:360px;
box-shadow:0 30px 60px rgba(0,0,0,0.35);
overflow:hidden;
}

/* header */

.header{
background:linear-gradient(135deg,var(--color-header1),var(--color-header2));
padding:30px 20px;
text-align:center;
color:white;
}

/* avatar inicial */

.avatar{
width:90px;
height:90px;
border-radius:50%;
background:white;
color:var(--color-accent);
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:bold;
margin:auto;
margin-bottom:10px;
}

/* nombre */

h1{
margin:5px 0;
font-size:24px;
}

/* empresa */

h2{
margin:0;
font-weight:normal;
font-size:16px;
opacity:0.9;
}

/* info */

.info{
padding:25px;
text-align:center;
color:#444;
line-height:1.8;
font-size:15px;
}

/* botones */

button{
background:linear-gradient(90deg,#ff9800,#ffb300);
border:none;
padding:15px;
width:85%;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* web */

.web{
display:block;
margin-top:18px;
color:var(--color-accent);
font-weight:bold;
text-decoration:none;
}

.web:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

<div class="header">

<div class="avatar" id="avatar">?</div>

<h1 id="nombre">Cargando...</h1>
<h2 id="empresa"></h2>

</div>

<div class="info">

<div id="info"></div>

<button onclick="guardarContacto()">📲 Guardar contacto</button>

<a id="web" class="web" target="_blank">🌐 Sitio Web</a>

</div>

</div>

<script>

let contactoActual = null;

function obtenerParametro(nombre) {
const urlParams = new URLSearchParams(window.location.search);
return urlParams.get(nombre);
}

function aplicarTema(empresa){

if(empresa.toLowerCase().includes("goya")){

document.documentElement.style.setProperty('--color-bg1','#0b3a82');
document.documentElement.style.setProperty('--color-bg2','#072a5a');

document.documentElement.style.setProperty('--color-header1','#0b3a82');
document.documentElement.style.setProperty('--color-header2','#1b4ea3');

document.documentElement.style.setProperty('--color-accent','#0b3a82');

}

if(empresa.toLowerCase().includes("precocidos")){

document.documentElement.style.setProperty('--color-bg1','#c40000');
document.documentElement.style.setProperty('--color-bg2','#8a0000');

document.documentElement.style.setProperty('--color-header1','#ff9800');
document.documentElement.style.setProperty('--color-header2','#ffb300');

document.documentElement.style.setProperty('--color-accent','#b30000');

}

}

const contactoID = obtenerParametro("contacto");

fetch("contactos.json")
.then(res => res.json())
.then(data => {

contactoActual = data[contactoID];

if(!contactoActual){
document.getElementById("nombre").innerText="Contacto no encontrado";
return;
}

aplicarTema(contactoActual.empresa);

document.getElementById("nombre").innerText = contactoActual.nombre;
document.getElementById("empresa").innerText = contactoActual.empresa;

let listaTelefonos = "";

if(contactoActual.telefonos){
  listaTelefonos = contactoActual.telefonos
    .map(t => "📞 " + t)
    .join("<br>");
}

document.getElementById("info").innerHTML = `
${listaTelefonos}<br>
✉ ${contactoActual.email}<br>
🌎 ${contactoActual.pais}
`;

document.getElementById("web").href = contactoActual.web;

/* avatar inicial */

document.getElementById("avatar").innerText =
contactoActual.nombre.charAt(0);

});

/* guardar contacto - CORREGIDO: con codificación UTF-8 */
function guardarContacto(){

let telefonosVCF = "";

if(contactoActual.telefonos && contactoActual.telefonos.length > 0) {
    // El primer teléfono como principal (WORK)
    telefonosVCF += `TEL;TYPE=WORK:${contactoActual.telefonos[0]}\n`;
    
    // Los siguientes teléfonos como secundarios (CELL)
    for(let i = 1; i < contactoActual.telefonos.length; i++) {
        telefonosVCF += `TEL;TYPE=CELL:${contactoActual.telefonos[i]}\n`;
    }
}

// IMPORTANTE: Agregamos CHARSET=UTF-8 para que los caracteres especiales se vean bien
const vcard =
`BEGIN:VCARD
VERSION:3.0
FN;CHARSET=UTF-8:${contactoActual.nombre}
ORG;CHARSET=UTF-8:${contactoActual.empresa}
${telefonosVCF}
EMAIL:${contactoActual.email}
URL:${contactoActual.web}
END:VCARD`;

// Especificamos correctamente el tipo con charset
const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
// El nombre del archivo con el nombre original
a.download = contactoActual.nombre + ".vcf";
a.click();

// Limpiar el objeto URL
window.URL.revokeObjectURL(url);

}

</script>

</body>
</html>
